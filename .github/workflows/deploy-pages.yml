name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Stage site
        run: |
          mkdir -p _site/fonts _site/sample/list
          sed 's|\./dist/LobeHub|\./fonts/LobeHub|g' index.html > _site/index.html
          cp dist/LobeHubFluentEmoji3DFont* _site/fonts/
          cp sample/list/favicon.ico _site/sample/list/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4
